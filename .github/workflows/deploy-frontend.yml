name: Deploy Angular to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/invoiceflow-ui/package-lock.json

      - name: Install dependencies
        working-directory: frontend/invoiceflow-ui
        run: npm ci

      - name: Build Angular app
        working-directory: frontend/invoiceflow-ui
        run: npm run build -- --configuration production --base-href /Invoice-Flow/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/invoiceflow-ui/dist/invoiceflow-ui/browser
